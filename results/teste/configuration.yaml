default_settings: null
behaviors:
  AirHockeyBrain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      shared_critic: false
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    checkpoint_interval: 500000
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 6
      vis_encode_type: simple
      memory: null
      goal_conditioning_type: hyper
      deterministic: false
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
        network_settings:
          normalize: false
          hidden_units: 128
          num_layers: 2
          vis_encode_type: simple
          memory: null
          goal_conditioning_type: hyper
          deterministic: false
    init_path: null
    keep_checkpoints: 5
    even_checkpoints: false
    max_steps: 100000000
    time_horizon: 100000
    summary_freq: 10000
    threaded: false
    self_play: null
    behavioral_cloning: null
env_settings:
  env_path: null
  env_args: null
  base_port: 5005
  num_envs: 1
  num_areas: 1
  timeout_wait: 60
  seed: -1
  max_lifetime_restarts: 10
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60
engine_settings:
  width: 84
  height: 84
  quality_level: 5
  time_scale: 20.0
  target_frame_rate: -1
  capture_frame_rate: 60
  no_graphics: false
  no_graphics_monitor: false
environment_parameters:
  reward_goal_scored:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9011
          value: 50.0
      name: reward_goal_scored
      completion_criteria: null
  reward_goal_conceded:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9012
          value: -10.0
      name: reward_goal_conceded
      completion_criteria: null
  reward_step_alive:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9013
          value: -0.001
      name: reward_step_alive
      completion_criteria: null
  reward_puck_side:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9014
          value: 0.00015
      name: reward_puck_side
      completion_criteria: null
  reward_puck_touch:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9015
          value: 0.0005
      name: reward_puck_touch
      completion_criteria: null
  reward_timeout:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9016
          value: -5.0
      name: reward_timeout
      completion_criteria: null
  split_behavior_names:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 9017
          value: 0.0
      name: split_behavior_names
      completion_criteria: null
checkpoint_settings:
  run_id: teste
  initialize_from: null
  load_model: false
  resume: false
  force: false
  train_model: false
  inference: false
  results_dir: results
torch_settings:
  device: null
debug: false
