behaviors:
  BlueBrain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 6
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1e8
    time_horizon: 100000
    summary_freq: 10000

  OrangeBrain:
    trainer_type: sac
    hyperparameters:
      batch_size: 1024
      buffer_size: 50000
      learning_rate: 3.0e-4
      learning_rate_schedule: constant
      init_entcoef: 1.0
      tau: 0.005
      steps_per_update: 10
      save_replay_buffer: false
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 4
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1e8
    time_horizon: 100000
    summary_freq: 10000

environment_parameters:
  split_behavior_names: 1.0
  grid_rows: 3.0
  grid_columns: 3.0
  reward_goal_scored: 50.0
  reward_goal_conceded: -10.0
  reward_step_alive: -0.001
  reward_puck_side: 0.00015
  reward_puck_touch: 0.0005
  reward_timeout: -5.0
